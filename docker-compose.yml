# ==============================================================================
# Docker Compose — ProuDig (Entwicklung + Produktion)
#
# Ports: App auf 8081, DB auf 5434 (5432 + 5433 bereits durch andere Projekte belegt)
#
# Verwendung:
#   Nur DB (Entwicklung): docker compose up proudig-db -d
#   Alles:                docker compose up -d
#   Logs:                 docker compose logs -f proudig-app
#   Stoppen:              docker compose down
# ==============================================================================

services:

  # ---------- PostgreSQL Datenbank ----------
  proudig-db:
    image: postgres:14-alpine
    container_name: proudig-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: proudigdb
      POSTGRES_USER: ${DB_USER:-proudig}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-proudig123}
      PGDATA: /var/lib/postgresql/data/pgdata
    # ports:
    #   - "5434:5432"          # Nur fuer lokale Entwicklung einkommentieren
    volumes:
      - proudig-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-proudig} -d proudigdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - proudig-network

  # ---------- Spring Boot Anwendung ----------
  proudig-app:
    build: .
    container_name: proudig-app
    restart: unless-stopped
    volumes:
      - ./data/files:/app/data/files      # Persistenter Speicher für Uploads
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://proudig-db:5432/proudigdb
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-proudig}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-proudig123}
      PREVIEW_PASSWORD: ${PREVIEW_PASSWORD:-proudig2026}
    # ports:
    #   - "8081:8081"          # Nicht noetig — Caddy im Docker-Netzwerk erreicht die App direkt
    depends_on:
      proudig-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - proudig-network

  # ---------- Caddy Reverse Proxy ----------
  # HTTPS für proudig.ai mit automatischem Let's Encrypt Zertifikat
  proudig-proxy:
    image: caddy:2-alpine
    container_name: proudig-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data          # Let's Encrypt Zertifikate
      - caddy_config:/config      # Caddy Konfiguration
    depends_on:
      proudig-app:
        condition: service_healthy
    networks:
      - proudig-network

networks:
  proudig-network:
    driver: bridge

volumes:
  proudig-pgdata:
  caddy_data:           # Let's Encrypt Zertifikate (persistent)
  caddy_config:         # Caddy Konfiguration (persistent)
