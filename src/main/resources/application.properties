spring.application.name=proudig-site
server.port=8081

# Preview password (override via environment: PREVIEW_PASSWORD=xxx)
app.preview-password=proudig2026

# Database - PostgreSQL (start with: docker compose up proudig-db -d)
spring.datasource.url=jdbc:postgresql://localhost:5434/proudigdb
spring.datasource.username=proudig
spring.datasource.password=proudig123

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/master.xml
spring.liquibase.enabled=true

# JWT Configuration
app.jwt-secret=proudig-secret-key-change-in-production-environment-12345678
app.jwt-expiration-ms=7200000
app.jwt-refresh-expiration-ms=604800000

# File Storage
filestorage.location=data/files

# Multipart file upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
